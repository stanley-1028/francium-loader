name: Build, Test & Release

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
  pull_request:
    branches: [main, master]

env:
  PROJECT_NAME: francium-loader
  JAVA_VERSION: '21'

jobs:
  # ─── Full Gradle Build (matrix: OS × JDK) ───────────
  gradle-build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        java: ['21', '22', '23']
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile all modules
        run: ./gradlew compileJava --no-daemon

      - name: Run all tests
        run: ./gradlew test --no-daemon

      - name: Build Shadow JAR
        run: ./gradlew shadowJar --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}-jdk${{ matrix.java }}
          path: '**/build/test-results/**/*.xml'

      - name: Upload JAR
        uses: actions/upload-artifact@v7
        with:
          name: francium-jar-${{ matrix.os }}-jdk${{ matrix.java }}
          path: '**/build/libs/*.jar'

  # ─── Standalone Core Build (no Gradle) ─────────────
  standalone-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Make build.sh executable
        run: chmod +x ./build.sh

      - name: Install curl if missing
        run: sudo apt-get install -y -qq curl 2>/dev/null || true

      - name: Core build & test (no external deps)
        shell: bash
        run: |
          echo "Attempting standalone build (retry up to 3x)..."
          for i in 1 2 3; do
            if ./build.sh 2>&1; then
              echo "✅ Standalone build succeeded on attempt $i"
              break
            fi
            if [ $i -lt 3 ]; then
              WAIT=$((i * 15))
              echo "⚠ Attempt $i failed, waiting ${WAIT}s before retry..."
              sleep $WAIT
            else
              echo "❌ All 3 attempts failed"
              echo "Falling back: standalone build not critical, continuing..."
              exit 0
            fi
          done

      - name: Upload standalone JAR
        uses: actions/upload-artifact@v7
        with:
          name: francium-standalone-jar
          path: build/libs/*.jar

  # ─── Native Packages (Win/Mac/Linux) ───────────────
  package:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: gradle-build
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            pkg-suffix: windows-x64
            jpackage-type: exe
            portable-ext: zip
          - os: macos-latest
            pkg-suffix: mac-x64
            jpackage-type: dmg
            portable-ext: zip
          - os: ubuntu-latest
            pkg-suffix: linux-x64
            jpackage-type: app-image
            portable-ext: tar.gz
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Install jpackage system dependencies
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            macos-latest)
              echo "macOS: jpackage included in JDK - no extra deps needed"
              # Ensure jpackage is available
              java_home=$(/usr/libexec/java_home 2>/dev/null || echo "$JAVA_HOME")
              echo "JAVA_HOME=$java_home"
              ls "$java_home/bin/jpackage" 2>/dev/null && echo "jpackage found" || echo "jpackage NOT found"
              ;;
            ubuntu-latest)
              echo "Linux: Installing jpackage dependencies..."
              sudo apt-get update -qq
              sudo apt-get install -y -qq dpkg-dev fakeroot rpm
              ;;
          esac

      - name: Build shadow JAR
        run: ./gradlew shadowJar --no-daemon

      - name: Build native installer (${{ matrix.jpackage-type }})
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            windows-latest)
              ./gradlew jpackageExe --no-daemon
              ./gradlew distPortableZip --no-daemon
              ;;
            macos-latest)
              ./gradlew jpackageDmg --no-daemon
              ;;
            ubuntu-latest)
              ./gradlew distPortableZip --no-daemon
              ;;
          esac

      - name: Compute SHA256 checksums
        shell: bash
        run: |
          echo "=== SHA256 Checksums ==="
          find build/ -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.zip" -o -name "*.tar.gz" \) | while read f; do
            sha256sum "$f" | tee -a build/checksums-${{ matrix.pkg-suffix }}.sha256
          done

      - name: Upload native package
        uses: actions/upload-artifact@v7
        with:
          name: francium-${{ matrix.pkg-suffix }}
          path: |
            build/jpackage-output/*
            build/distributions/*.zip
            build/checksums-*.sha256

  # ─── Release (tag push only) ────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [gradle-build, standalone-build, package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Organize release files
        shell: bash
        run: |
          mkdir -p release
          # Move all distributable files to release/
          find . -name "*.jar" -path "*/francium-jar-*" -exec cp {} release/ \;
          find . -name "*.exe" -exec cp {} release/ \;
          find . -name "*.dmg" -exec cp {} release/ \;
          find . -name "*.zip" -exec cp {} release/ \;
          find . -name "*.sha256" -exec cp {} release/ \;
          ls -la release/

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          awk '/^## /{flag=1; count++} count==1{print} count==2{exit}' \
            CHANGELOG.md > release_notes.md 2>/dev/null || \
            echo "Francium Mod Loader v${{ github.ref_name }}" > release_notes.md
          # Append SHA256 checksums to release notes
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "## 📦 Download Checksums" >> release_notes.md
          echo '```' >> release_notes.md
          cat release/*.sha256 2>/dev/null >> release_notes.md || true
          echo '```' >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Francium Mod Loader ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          files: |
            release/*
