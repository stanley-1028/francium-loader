name: Build, Test & Release

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  # ─── Full Gradle Build (matrix: OS × JDK) ───────────
  gradle-build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        java: ['21', '22', '23']
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile all modules
        run: ./gradlew compileJava --no-daemon

      - name: Run all tests
        run: ./gradlew test --no-daemon

      - name: Build Shadow JAR
        run: ./gradlew shadowJar --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-jdk${{ matrix.java }}
          path: '**/build/test-results/**/*.xml'

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: francium-jar-${{ matrix.os }}-jdk${{ matrix.java }}
          path: '**/build/libs/*.jar'

  # ─── Standalone Core Build (no Gradle) ─────────────
  standalone-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Core build & test (no external deps)
        shell: bash
        run: |
          chmod +x ./build.sh
          ./build.sh

  # ─── Native Packages (Win/Mac/Linux) ───────────────
  package:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: gradle-build
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build shadow JAR
        run: ./gradlew shadowJar --no-daemon

      - name: Build native installer
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            ./gradlew jpackageExe --no-daemon
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            ./gradlew jpackageDmg --no-daemon
          elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            ./gradlew distPortableZip --no-daemon
          fi

      - name: Upload native package
        uses: actions/upload-artifact@v4
        with:
          name: francium-native-${{ matrix.os }}
          path: |
            build/jpackage-output/*
            build/distributions/*.zip

  # ─── Release (tag push only) ────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [gradle-build, standalone-build, package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          awk '/^## /{flag=1; count++} count==1{print} count==2{exit}' \
            CHANGELOG.md > release_notes.md 2>/dev/null || \
            echo "Francium Mod Loader v${{ github.ref_name }}" > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Francium Mod Loader ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          files: |
            francium-jar-*/*.jar
            francium-native-*/*
