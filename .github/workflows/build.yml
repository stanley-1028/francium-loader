name: Build & Test

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  # ─── Full Gradle Build (matrix: OS × JDK) ───────────
  gradle-build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        java: ['21', '22', '23']
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile all modules
        run: ./gradlew compileJava --no-daemon

      - name: Run all tests
        run: ./gradlew test --no-daemon

      - name: Build JAR
        run: ./gradlew jar --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-jdk${{ matrix.java }}
          path: '**/build/test-results/**/*.xml'

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: francium-jar-${{ matrix.os }}-jdk${{ matrix.java }}
          path: '**/build/libs/*.jar'

  # ─── Standalone Core Build (no Gradle) ─────────────
  standalone-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Core build & test (no external deps)
        run: |
          chmod +x ./build.sh
          ./build.sh

  # ─── Release (tag push only) ────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [gradle-build, standalone-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build fat JAR
        run: ./gradlew fatJar --no-daemon

      - name: Build distributions
        run: ./gradlew jar sourcesJar javadocJar --no-daemon

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          awk '/^## /{flag=1; count++} count==1{print} count==2{exit}' \
            CHANGELOG.md > release_notes.md 2>/dev/null || \
            echo "Francium Mod Loader v${{ github.ref_name }}" > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Francium Mod Loader ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          files: |
            **/build/libs/*.jar
